name = "drunkdeer-telemetry"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# No user data flows into this Worker (the /ping + /stats endpoints were
# removed when the app stopped collecting usage telemetry — see the README
# in this folder for the rationale). The remaining surface is a one-way
# server → client firmware-version channel, so observability is off mostly
# as defence in depth.
[observability]
enabled = false

[[kv_namespaces]]
binding = "KV"
id = "dd43f234937a48e29e395726bb0204a0"
preview_id = "15161585bf4343c3801b6133d390c922"

# Firmware-version cron — daily at 06:00 UTC. Scrapes the DrunkDeer
# downloads page, parses the latest DrunkdeerUpdaterV*.zip's config.ini,
# and writes per-PID firmware versions to KV. See `scheduled` in
# src/index.ts. Manual invoke during dev: `wrangler dev --test-scheduled`
# then `curl "http://localhost:8787/__scheduled?cron=0+6+*+*+*"`.
[triggers]
crons = ["0 6 * * *"]
